<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=375"><link rel="stylesheet" href="../css/mobile.css"></head>
<body>
  <div class="status-bar light">
    <div class="notch"></div>
    <span>9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>
  <div class="screen-content">
    <div class="form-header">
      <button class="back-btn" onclick="window.parent.goto('perfil')">←</button>
      <div class="form-header-title">Minha Moto</div>
    </div>
    <div class="moto-hero">
      <div class="moto-avatar">🏍️</div>
      <div style="flex:1">
        <div class="moto-name">Honda CB 500F</div>
        <div class="moto-sub">2022 · Vermelha · ABS</div>
        <div class="moto-stat-row" style="margin-top:10px">
          <div class="moto-stat"><div class="moto-stat-val">47.320</div><div class="moto-stat-label">km rodados</div></div>
          <div class="moto-stat"><div class="moto-stat-val">22</div><div class="moto-stat-label">km/l</div></div>
          <div class="moto-stat"><div class="moto-stat-val">17L</div><div class="moto-stat-label">tanque</div></div>
        </div>
      </div>
    </div>
    <div class="section-label">ESPECIFICAÇÕES</div>
    <div class="spec-item"><span class="spec-icon">🔧</span><span class="spec-label">Cilindrada</span><span class="spec-value">471cc</span></div>
    <div class="spec-item"><span class="spec-icon">⚡</span><span class="spec-label">Potência</span><span class="spec-value">47cv</span></div>
    <div class="spec-item"><span class="spec-icon">⚖️</span><span class="spec-label">Peso</span><span class="spec-value">192kg</span></div>
    <div class="spec-item"><span class="spec-icon">📏</span><span class="spec-label">Autonomia estimada</span><span class="spec-value">374km</span></div>
    <div class="spec-item"><span class="spec-icon">🔩</span><span class="spec-label">Próxima revisão</span><span class="spec-value">50.000km</span></div>
    <div class="section-label">EQUIPAMENTOS</div>
    <div class="chip-group">
      <span class="chip active">Baú lateral</span><span class="chip active">GPS integrado</span>
      <span class="chip active">Protetor de motor</span><span class="chip inactive">Porta-malas</span>
      <span class="chip inactive">Intercomunicador</span>
    </div>
    <button class="btn-primary">✏️ Editar moto</button>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.parent.goto('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </button>
    <button class="nav-item" onclick="window.parent.goto('realizadas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Viagens
    </button>
    <button class="nav-item" onclick="window.parent.goto('ativa')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Em Moto
    </button>
    <button class="nav-item  active" onclick="window.parent.goto('perfil')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </button>
  </nav>
</body></html>
