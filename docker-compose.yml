name: motoroute

networks:
  motoroute-net:
    driver: bridge

volumes:
  db-data:
  storage-data:

services:

  # ── Banco de dados (Postgres 15 com extensões Supabase) ─────
  db:
    image: supabase/postgres:15.1.1.41
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - motoroute-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kong (API Gateway — ponto de entrada do Supabase) ────────
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "54321:8000"   # ← EXPO_PUBLIC_SUPABASE_URL aponta aqui
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./docker/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy

  # ── Auth / GoTrue ────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:8081
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      # Em dev local não precisamos de confirmação por e-mail
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      # E-mails capturados pelo Inbucket em vez de enviados de verdade
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_ADMIN_EMAIL: admin@motoroute.local
      GOTRUE_SMTP_SENDER_NAME: MotoRoute Dev
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy

  # ── PostgREST (API REST automática sobre o Postgres) ─────────
  rest:
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy
    command: ["postgrest"]

  # ── Realtime (subscriptions em tempo real) ───────────────────
  realtime:
    image: supabase/realtime:v2.28.32
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3uFeDt5BWI
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"

  # ── Storage (upload de arquivos) ─────────────────────────────
  storage:
    image: supabase/storage-api:v1.0.6
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - storage-data:/var/lib/storage
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  # ── pg-meta (backend do Studio) ──────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.83.2
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy

  # ── Studio (painel visual do Supabase) ───────────────────────
  studio:
    image: supabase/studio:20240729-ce42139
    restart: unless-stopped
    ports:
      - "54323:3000"   # ← abrir no browser: http://localhost:54323
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: MotoRoute
      DEFAULT_PROJECT_NAME: motoroute-dev
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ""
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy

  # ── Inbucket (captura e-mails de auth em dev) ────────────────
  inbucket:
    image: inbucket/inbucket:3.0.4
    restart: unless-stopped
    ports:
      - "54324:9000"   # ← caixa de entrada web: http://localhost:54324
      - "2500:2500"    # SMTP interno (recebe do GoTrue)
    networks:
      - motoroute-net

  # ── Expo (app React Native + Web) ────────────────────────────
  expo:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"    # ← app web: http://localhost:8081
      - "19000:19000"  # Expo Go (celular via IP da máquina)
      - "19001:19001"  # Metro bundler inspector
    environment:
      EXPO_PUBLIC_SUPABASE_URL: http://localhost:54321
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      EXPO_PUBLIC_WEATHER_API_KEY: ${WEATHER_API_KEY}
      # Para usar Expo Go no celular: defina HOST_IP com o IP da sua máquina
      # ex: HOST_IP=192.168.1.100 docker compose up
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-localhost}
      # Polling de filesystem — necessário no Windows/Docker (WSL não propaga inotify events).
      # Sem isso, Metro não detecta mudanças de arquivo e o HMR não funciona.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - .:/app
    networks:
      - motoroute-net
    depends_on:
      - kong
      - auth

  # ── Edge Functions (Deno runtime) ────────────────────────────
  functions:
    image: supabase/edge-runtime:v1.58.6
    restart: unless-stopped
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VERIFY_JWT: "false"
    command:
      - start
      - --main-service
      - /home/deno/functions/directions
      - --port
      - "9000"
    networks:
      - motoroute-net
    depends_on:
      db:
        condition: service_healthy
